<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/domino-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>دومینویار</title>

    <link rel="preload" href="/fonts/YekanBakh-VF.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#111827" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="دومینویار" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <script>
      if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
