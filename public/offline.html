<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>آفلاین</title>
    <style>
      @font-face {
        font-family: 'Yekan Bakh';
        src: url('/fonts/YekanBakh-VF.woff2') format('woff2'),
          url('/fonts/YekanBakh-VF.woff') format('woff');
        font-weight: 100 950;
        font-style: normal;
        font-display: swap;
      }

      body {
        margin: 0;
        font-family: 'Yekan Bakh', Tahoma, Arial, sans-serif;
        background: #0d1721;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        padding: 24px;
      }
      .card {
        background: rgba(255, 255, 255, 0.06);
        border-radius: 24px;
        padding: 28px;
        max-width: 420px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 0;
        line-height: 1.7;
        color: #cbd5f0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>اتصال قطع است</h1>
      <p>
        اگر یک‌بار برنامه را باز کرده باشید، بازی سریع و امتیازهای ذخیره‌شده به‌صورت آفلاین در دسترس می‌مانند.
      </p>
    </div>
  </body>
</html>
